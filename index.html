<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sumapaz</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-side"></div>
    <div class="topbar-title">SUMAPAZ</div>
    <div class="topbar-side"></div>
  </header>

  <main class="home-split">
    <!-- PANEL SOMOS -->
    <section class="panel panel-left">
      <div class="panel-bg panel-bg-somos"></div>
      <div class="panel-overlay"></div>

      <div class="panel-inner">
        <a href="somos/index.html" class="panel-logo-link panel-logo-link-somos" aria-label="Ir a Somos Sumapaz">
          <img
            src="assets/somos-sumapaz-logo.png"
            alt="Proyecto Somos Sumapaz"
            class="panel-logo"
          />
        </a>
      </div>
    </section>

    <!-- PANEL MEMORIA -->
    <section class="panel panel-right">
      <div class="panel-bg panel-bg-memoria"></div>
      <div class="panel-overlay"></div>

      <div class="panel-inner">
        <a href="memoria/index.html" class="panel-logo-link panel-logo-link-memoria" aria-label="Ir a Memoria Sumapaz">
          <img
            src="assets/memoria-sumapaz-logo.png"
            alt="Proyecto Memoria Sumapaz"
            class="panel-logo logo-default"
          />
          <img
            src="assets/memoria-sumapaz-blanco.png"
            alt="Proyecto Memoria Sumapaz"
            class="panel-logo logo-hover"
          />
        </a>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
